<svg width="400" height="300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#skyGradient)"/>
  
  <!-- Sun -->
  <circle cx="100" cy="80" r="40" fill="#FFD700" opacity="0.8"/>
  <circle cx="100" cy="80" r="35" fill="#FFA500"/>
  
  <!-- Clouds -->
  <g opacity="0.9">
    <ellipse cx="280" cy="70" rx="35" ry="25" fill="white"/>
    <ellipse cx="260" cy="75" rx="30" ry="22" fill="white"/>
    <ellipse cx="300" cy="75" rx="30" ry="22" fill="white"/>
  </g>
  
  <!-- Rain drops -->
  <g opacity="0.6" fill="#4A90E2">
    <ellipse cx="250" cy="120" rx="3" ry="8"/>
    <ellipse cx="270" cy="135" rx="3" ry="8"/>
    <ellipse cx="290" cy="125" rx="3" ry="8"/>
    <ellipse cx="310" cy="140" rx="3" ry="8"/>
  </g>
  
  <!-- Temperature display card -->
  <rect x="50" y="160" width="300" height="110" rx="15" fill="white" opacity="0.95"/>
  
  <!-- Temperature -->
  <text x="200" y="210" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#2C3E50" text-anchor="middle">24°</text>
  
  <!-- Location and details -->
  <text x="200" y="240" font-family="Arial, sans-serif" font-size="16" fill="#666" text-anchor="middle">Pronóstico en tiempo real</text>
  
  <!-- Weather icons -->
  <text x="80" y="255" font-size="24">☀️</text>
  <text x="160" y="255" font-size="24">🌧️</text>
  <text x="240" y="255" font-size="24">☁️</text>
  <text x="320" y="255" font-size="24">❄️</text>
</svg>
