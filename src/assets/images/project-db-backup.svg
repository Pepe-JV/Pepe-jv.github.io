<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#334155;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Rectangle -->
  <rect width="800" height="600" fill="url(#bgGrad)"/>
  
  <!-- Main Terminal Card -->
  <rect x="100" y="80" width="600" height="440" rx="12" fill="url(#cardGrad)" stroke="#475569" stroke-width="2"/>
  
  <!-- Terminal Header -->
  <rect x="100" y="80" width="600" height="40" rx="12" fill="#1e293b"/>
  <circle cx="125" cy="100" r="6" fill="#ef4444"/>
  <circle cx="145" cy="100" r="6" fill="#f59e0b"/>
  <circle cx="165" cy="100" r="6" fill="#10b981"/>
  
  <!-- Terminal Title -->
  <text x="400" y="105" font-family="monospace" font-size="14" fill="#94a3b8" text-anchor="middle">backup.php</text>
  
  <!-- CLI Icon / Logo -->
  <g transform="translate(250, 160)">
    <!-- Database Icon -->
    <ellipse cx="150" cy="40" rx="80" ry="25" fill="none" stroke="url(#accentGrad)" stroke-width="4"/>
    <ellipse cx="150" cy="60" rx="80" ry="25" fill="none" stroke="url(#accentGrad)" stroke-width="4"/>
    <line x1="70" y1="40" x2="70" y2="60" stroke="url(#accentGrad)" stroke-width="4"/>
    <line x1="230" y1="40" x2="230" y2="60" stroke="url(#accentGrad)" stroke-width="4"/>
    <ellipse cx="150" cy="80" rx="80" ry="25" fill="none" stroke="url(#accentGrad)" stroke-width="4"/>
    <line x1="70" y1="60" x2="70" y2="80" stroke="url(#accentGrad)" stroke-width="4"/>
    <line x1="230" y1="60" x2="230" y2="80" stroke="url(#accentGrad)" stroke-width="4"/>
    
    <!-- Backup Arrow -->
    <path d="M 150 110 L 150 140" stroke="#10b981" stroke-width="4" fill="none"/>
    <path d="M 140 130 L 150 140 L 160 130" stroke="#10b981" stroke-width="4" fill="none"/>
    
    <!-- Storage Icon -->
    <rect x="110" y="150" width="80" height="60" rx="8" fill="none" stroke="#10b981" stroke-width="4"/>
    <line x1="120" y1="170" x2="180" y2="170" stroke="#10b981" stroke-width="2"/>
    <line x1="120" y1="185" x2="170" y2="185" stroke="#10b981" stroke-width="2"/>
  </g>
  
  <!-- Terminal Output Text -->
  <text x="120" y="400" font-family="monospace" font-size="14" fill="#10b981">[SUCCESS] Backup completado</text>
  <text x="120" y="425" font-family="monospace" font-size="14" fill="#3b82f6">[INFO] Tamaño: 24.5 MB</text>
  <text x="120" y="450" font-family="monospace" font-size="14" fill="#3b82f6">[INFO] Cloud: ✓ Uploaded</text>
  <text x="120" y="475" font-family="monospace" font-size="14" fill="#8b5cf6">[NOTIFY] Slack: ✓ Sent</text>
  
  <!-- Title at bottom -->
  <text x="400" y="555" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="url(#accentGrad)" text-anchor="middle">Database Backup CLI Tool</text>
  <text x="400" y="580" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">PHP • MySQL • PostgreSQL • MongoDB • Cloud Storage</text>
</svg>
